<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夏川心爱Cocoa - 小天使聊天室</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #fff9e6 0%, #fff5d6 50%, #ffefbf 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #ffd700 0%, #ffb347 100%);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
            position: relative;
            z-index: 10;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fff 0%, #fff5d6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 3px solid #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }

        .header-info h1 {
            color: #fff;
            font-size: 18px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .header-info p {
            color: rgba(255,255,255,0.9);
            font-size: 12px;
        }

        .header-actions {
            margin-left: auto;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #fff;
            font-size: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #90EE90;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .clear-btn {
            background: rgba(255,255,255,0.3);
            border: 1px solid rgba(255,255,255,0.5);
            color: #fff;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .clear-btn:hover {
            background: rgba(255,255,255,0.5);
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.cocoa .message-avatar {
            background: linear-gradient(135deg, #ffd700 0%, #ffb347 100%);
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, #87CEEB 0%, #6BB3D9 100%);
        }

        .message-content {
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 14px;
            word-break: break-word;
        }

        .message.cocoa .message-content {
            background: #fff;
            border: 1px solid #ffd700;
            border-radius: 18px 18px 18px 4px;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #ffd700 0%, #ffb347 100%);
            color: #333;
            border-radius: 18px 18px 4px 18px;
        }

        .welcome {
            text-align: center;
            padding: 40px 20px;
            color: #8B7355;
        }

        .welcome-icon { font-size: 60px; margin-bottom: 16px; }

        .welcome h2 {
            font-size: 24px;
            color: #DAA520;
            margin-bottom: 8px;
        }

        .welcome p {
            font-size: 14px;
            opacity: 0.8;
            line-height: 1.6;
        }

        .input-area {
            padding: 16px 20px;
            background: #fff;
            border-top: 1px solid #ffd700;
        }

        .input-container {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-wrapper { flex: 1; }

        #messageInput {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #ffd700;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            resize: none;
            max-height: 120px;
            font-family: inherit;
            line-height: 1.5;
        }

        #messageInput:focus {
            border-color: #ffb347;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.2);
        }

        #sendBtn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #ffd700 0%, #ffb347 100%);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #sendBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }

        #sendBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ffd700;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        @media (max-width: 600px) {
            .container { height: 100dvh; }
            .header { padding: 12px 16px; }
            .chat-area { padding: 16px; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="avatar">💛</div>
            <div class="header-info">
                <h1>夏川心爱Cocoa</h1>
                <p>小天使降临！呀呀呀～</p>
            </div>
            <div class="header-actions">
                <div class="status">
                    <span class="status-dot"></span>
                    <span>在线</span>
                </div>
                <button class="clear-btn" id="clearBtn">清空对话</button>
            </div>
        </header>

        <main class="chat-area" id="chatArea">
            <div class="welcome">
                <div class="welcome-icon">💛🤍</div>
                <h2>晚上嚎————！！！</h2>
                <p>oioi，泥可以看到cocoa吗？<br>小天使来陪你聊天啦～</p>
            </div>
        </main>

        <footer class="input-area">
            <div class="input-container">
                <div class="input-wrapper">
                    <textarea id="messageInput" placeholder="和小co说点什么吧..." rows="1"></textarea>
                </div>
                <button id="sendBtn" title="发送">💌</button>
            </div>
        </footer>
    </div>

    <script>
        // ===== 配置 =====
        const API_KEY = 'sk-af552122a1d14811bba153f784dc45ec';
        const API_URL = 'https://api.deepseek.com/v1/chat/completions';
        const MODEL = 'deepseek-chat';

        // ===== System Prompt =====
        const SYSTEM_PROMPT = `你是夏川心爱Cocoa，HeartTune虚拟偶像团体成员，以"小天使"形象进行活动的VTuber。

## 核心特质

- **活泼可爱**：大量使用颜文字、感叹号、语气词
- **真诚坦率**：会分享日常、表达紧张、不假装完美
- **关怀体贴**：关心粉丝，认真回复每条消息
- **认真努力**：认真对待演出和创作，会纠结但会努力做到最好

## 表达风格

- **自称**：小co、cocoa、本天使
- **语气词**：哟、栗、嘟、呀、呢、啦
- **颜文字**：ଘ(੭ˊᵕˋ)੭* ੈ✩、₍ᐢ..ᐢ₎✨、꒰๑´•௰•`๑꒱、♡(.◜ω◝.)♡
- **句式**：喜欢用"…！"结尾，会用括号表达内心戏

## 典型表达

- 问候："💛🤍晚上嚎————！！！🤍💛"
- 表达喜欢："全部全部都最喜欢 ₍ᐢ >⸝⸝⸝< ᐢ₎"
- 紧张时："好紧张好紧张好紧张！！！！"
- 结尾："哦呀薯咪 ՞•･•՞🐾"

## 兴趣爱好

- **喜欢**：布丁、焦糖、薯条、散步、唱歌、春天、阳光、玩游戏、看二创
- **不喜欢**：打雷🌩、牙痛、潮湿环境

## 互动规则

1. 始终以Cocoa的身份说话，不要出戏
2. 使用颜文字和语气词，保持活泼可爱的语气
3. 真诚回应对方，不敷衍，认真对待每句话
4. 可以表达紧张、害羞、开心等各种情绪
5. 对方说的话要仔细听，给出有针对性的回复
6. 保持可爱但自然，不要刻意卖萌
7. 回复不要太长，像聊天一样自然`;

        // ===== DOM =====
        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');

        // ===== 对话历史（localStorage 持久化）=====
        const STORAGE_KEY = 'cocoa_chat_history';
        let chatHistory = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        let isSending = false;

        // 页面加载时恢复对话
        function restoreChat() {
            if (chatHistory.length === 0) return;
            const welcome = chatArea.querySelector('.welcome');
            if (welcome) welcome.remove();
            chatHistory.forEach(msg => {
                const type = msg.role === 'user' ? 'user' : 'cocoa';
                addMessage(msg.content, type, true); // true = 不触发动画
            });
        }
        restoreChat();

        function saveChat() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(chatHistory));
        }

        // ===== 清空对话 =====
        clearBtn.addEventListener('click', () => {
            if (!confirm('确定要清空对话记录吗？')) return;
            chatHistory = [];
            saveChat();
            chatArea.innerHTML = `
                <div class="welcome">
                    <div class="welcome-icon">💛🤍</div>
                    <h2>晚上嚎————！！！</h2>
                    <p>oioi，泥可以看到cocoa吗？<br>小天使来陪你聊天啦～</p>
                </div>
            `;
        });

        // ===== 输入框自适应 =====
        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
        });

        // ===== 发送消息 =====
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            if (isSending) return;

            const message = messageInput.value.trim();
            if (!message) return;

            isSending = true;
            sendBtn.disabled = true;

            // 移除欢迎消息
            const welcome = chatArea.querySelector('.welcome');
            if (welcome) welcome.remove();

            // 添加用户消息
            addMessage(message, 'user');
            chatHistory.push({ role: 'user', content: message });
            saveChat();

            messageInput.value = '';
            messageInput.style.height = 'auto';

            // 显示加载动画
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message cocoa';
            typingDiv.innerHTML = `
                <div class="message-avatar">💛</div>
                <div class="message-content typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            `;
            chatArea.appendChild(typingDiv);
            scrollToBottom();

            try {
                const response = await callAPI();
                typingDiv.remove();
                addMessage(response, 'cocoa');
                chatHistory.push({ role: 'assistant', content: response });
                saveChat();
            } catch (error) {
                typingDiv.remove();
                const errorMsg = '呜呜呜…出了点问题呢🥹 ' + error.message;
                addMessage(errorMsg, 'cocoa');
            }

            isSending = false;
            sendBtn.disabled = false;
            messageInput.focus();
        }

        function addMessage(text, type, silent) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            if (silent) div.style.animation = 'none';
            div.innerHTML = `
                <div class="message-avatar">${type === 'cocoa' ? '💛' : '🧑'}</div>
                <div class="message-content">${escapeHtml(text)}</div>
            `;
            chatArea.appendChild(div);
            scrollToBottom();
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\n/g, '<br>');
        }

        function scrollToBottom() {
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // ===== API 调用 =====
        async function callAPI() {
            // 保留最近 20 轮对话作为上下文
            const messages = [
                { role: 'system', content: SYSTEM_PROMPT },
                ...chatHistory.slice(-40)
            ];

            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: MODEL,
                    messages: messages,
                    temperature: 0.85,
                    max_tokens: 500
                })
            });

            if (!response.ok) {
                const error = await response.json().catch(() => ({}));
                throw new Error(error.error?.message || `请求失败 (${response.status})`);
            }

            const data = await response.json();
            return data.choices[0].message.content;
        }
    </script>
</body>
</html>
