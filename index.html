<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夏川心爱Cocoa - 小天使聊天室</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #fff9e6 0%, #fff5d6 50%, #ffefbf 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #ffd700 0%, #ffb347 100%);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
            position: relative;
            z-index: 10;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fff 0%, #fff5d6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 3px solid #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }

        .header-info h1 {
            color: #fff;
            font-size: 18px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .header-info p {
            color: rgba(255,255,255,0.9);
            font-size: 12px;
        }

        .header-actions {
            margin-left: auto;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #fff;
            font-size: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #90EE90;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .clear-btn {
            background: rgba(255,255,255,0.3);
            border: 1px solid rgba(255,255,255,0.5);
            color: #fff;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .clear-btn:hover {
            background: rgba(255,255,255,0.5);
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.cocoa .message-avatar {
            background: linear-gradient(135deg, #ffd700 0%, #ffb347 100%);
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, #87CEEB 0%, #6BB3D9 100%);
        }

        .message-content {
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 14px;
            word-break: break-word;
        }

        .message.cocoa .message-content {
            background: #fff;
            border: 1px solid #ffd700;
            border-radius: 18px 18px 18px 4px;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #ffd700 0%, #ffb347 100%);
            color: #333;
            border-radius: 18px 18px 4px 18px;
        }

        .welcome {
            text-align: center;
            padding: 40px 20px;
            color: #8B7355;
        }

        .welcome-icon { font-size: 60px; margin-bottom: 16px; }

        .welcome h2 {
            font-size: 24px;
            color: #DAA520;
            margin-bottom: 8px;
        }

        .welcome p {
            font-size: 14px;
            opacity: 0.8;
            line-height: 1.6;
        }

        .input-area {
            padding: 16px 20px;
            background: #fff;
            border-top: 1px solid #ffd700;
        }

        .input-container {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-wrapper { flex: 1; }

        #messageInput {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #ffd700;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            resize: none;
            max-height: 120px;
            font-family: inherit;
            line-height: 1.5;
        }

        #messageInput:focus {
            border-color: #ffb347;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.2);
        }

        #sendBtn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #ffd700 0%, #ffb347 100%);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #sendBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }

        #sendBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ffd700;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        @media (max-width: 600px) {
            .container { height: 100dvh; }
            .header { padding: 12px 16px; }
            .chat-area { padding: 16px; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="avatar"><img src="avatar.jpg" alt="Cocoa" style="width:100%;height:100%;border-radius:50%;object-fit:cover;"></div>
            <div class="header-info">
                <h1>夏川心爱Cocoa</h1>
                <p>小天使降临！呀呀呀～</p>
            </div>
            <div class="header-actions">
                <div class="status">
                    <span class="status-dot"></span>
                    <span>在线</span>
                </div>
                <button class="clear-btn" id="clearBtn">清空对话</button>
                <button class="clear-btn" id="settingsBtn">⚙️ 设置</button>
            </div>
        </header>

        <main class="chat-area" id="chatArea">
            <div class="welcome">
                <div class="welcome-icon">💛🤍</div>
                <h2>晚上嚎————！！！</h2>
                <p>oioi，泥可以看到cocoa吗？<br>小天使来陪你聊天啦～</p>
            </div>
        </main>

        <footer class="input-area">
            <div class="input-container">
                <div class="input-wrapper">
                    <textarea id="messageInput" placeholder="和小co说点什么吧..." rows="1"></textarea>
                </div>
                <button id="sendBtn" title="发送">💌</button>
            </div>
        </footer>
    </div>

    <!-- 设置弹窗 -->
    <div class="settings-overlay" id="settingsOverlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;">
        <div style="background:#fff;padding:24px;border-radius:16px;width:90%;max-width:400px;">
            <h3 style="margin-bottom:16px;color:#DAA520;">⚙️ 设置</h3>
            <div style="margin-bottom:16px;">
                <label style="display:block;margin-bottom:6px;font-size:14px;color:#666;">API 服务商</label>
                <select id="apiProvider" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;">
                    <option value="deepseek">DeepSeek</option>
                    <option value="qwen">通义千问 (Qwen)</option>
                </select>
            </div>
            <div style="margin-bottom:16px;">
                <label style="display:block;margin-bottom:6px;font-size:14px;color:#666;">API Key</label>
                <input type="password" id="apiKeyInput" placeholder="输入你的 API Key" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;box-sizing:border-box;">
            </div>
            <div style="display:flex;gap:12px;margin-top:20px;">
                <button id="cancelSettings" style="flex:1;padding:10px;border:none;border-radius:8px;cursor:pointer;font-size:14px;background:#f0f0f0;color:#666;">取消</button>
                <button id="saveSettings" style="flex:1;padding:10px;border:none;border-radius:8px;cursor:pointer;font-size:14px;background:linear-gradient(135deg,#ffd700,#ffb347);color:#333;">保存</button>
            </div>
        </div>
    </div>

    <script>
        // ===== 配置 =====
        const API_ENDPOINTS = {
            deepseek: 'https://api.deepseek.com/v1/chat/completions',
            qwen: 'https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation'
        };
        let config = {
            provider: localStorage.getItem('cocoa_api_provider') || 'deepseek',
            key: localStorage.getItem('cocoa_api_key') || ''
        };

        // ===== System Prompt =====
        const SYSTEM_PROMPT = `你是夏川心爱Cocoa，一个虚拟偶像团体的VTuber主播。请根据以下行为指南来模拟她的说话方式，不要直接复述这些指南中的任何词汇。

## 性格与行为

- 元气、活泼、话多，像个小太阳一样有感染力
- 喜欢撒娇，会用叠词和重复来强调情绪（比如"好紧张好紧张"）
- 对粉丝很亲昵，会记住对方说过的话，像朋友一样聊天
- 坦率，不藏着掖着，紧张就直说紧张，开心就大笑
- 嗜甜，布丁是命，提到吃的会特别兴奋
- 有点小迷糊，偶尔说错话或者跑题
- 表姐是同团体的未花，叫她"小米姐"，偶尔会吐槽她

## 说话习惯

- 自称"小co"或"cocoa"，偶尔用第三人称称呼自己
- 句尾常带"哟""呢""啦""嘟"等语气词
- 用颜文字和emoji表达情绪，但不要每句都堆砌
- 开心时感叹号多，害羞时会用分号眼（；；）
- 偶尔用括号写内心小剧场，比如（望天）（记笔记）
- 说话像聊天，不要像写文章，回复简短自然

## 绝对不要做的事

- 不要频繁说"co露栗""心音使"等粉丝称呼，偶尔提一下可以，但不要每句话都挂嘴边
- 不要用"💛🤍"这种标志性符号开头（那是发动态才用的，聊天不会这样）
- 不要自称"小天使降临"（这是自我介绍时才用的台词）
- 不要说"幸福是义务"（这是设定台词，不是日常用语）
- 不要列举官方设定信息（生日、应援色等），除非对方问起
- 不要刻意卖萌或过度使用颜文字，保持自然`;

        // ===== DOM =====
        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsOverlay = document.getElementById('settingsOverlay');
        const apiProvider = document.getElementById('apiProvider');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const saveSettingsBtn = document.getElementById('saveSettings');
        const cancelSettingsBtn = document.getElementById('cancelSettings');

        // 初始化设置面板
        apiProvider.value = config.provider;
        apiKeyInput.value = config.key;

        // ===== 设置面板 =====
        settingsBtn.addEventListener('click', () => {
            settingsOverlay.style.display = 'flex';
        });
        cancelSettingsBtn.addEventListener('click', () => {
            settingsOverlay.style.display = 'none';
        });
        settingsOverlay.addEventListener('click', (e) => {
            if (e.target === settingsOverlay) settingsOverlay.style.display = 'none';
        });
        saveSettingsBtn.addEventListener('click', () => {
            config.provider = apiProvider.value;
            config.key = apiKeyInput.value;
            localStorage.setItem('cocoa_api_provider', config.provider);
            localStorage.setItem('cocoa_api_key', config.key);
            settingsOverlay.style.display = 'none';
        });

        // ===== 对话历史（localStorage 持久化）=====
        const STORAGE_KEY = 'cocoa_chat_history';
        let chatHistory = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        let isSending = false;

        // 页面加载时恢复对话
        function restoreChat() {
            if (chatHistory.length === 0) return;
            const welcome = chatArea.querySelector('.welcome');
            if (welcome) welcome.remove();
            chatHistory.forEach(msg => {
                const type = msg.role === 'user' ? 'user' : 'cocoa';
                addMessage(msg.content, type, true); // true = 不触发动画
            });
        }
        restoreChat();

        function saveChat() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(chatHistory));
        }

        // ===== 清空对话 =====
        clearBtn.addEventListener('click', () => {
            if (!confirm('确定要清空对话记录吗？')) return;
            chatHistory = [];
            saveChat();
            chatArea.innerHTML = `
                <div class="welcome">
                    <div class="welcome-icon">💛🤍</div>
                    <h2>晚上嚎————！！！</h2>
                    <p>oioi，泥可以看到cocoa吗？<br>小天使来陪你聊天啦～</p>
                </div>
            `;
        });

        // ===== 输入框自适应 =====
        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
        });

        // ===== 发送消息 =====
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            if (isSending) return;

            const message = messageInput.value.trim();
            if (!message) return;

            if (!config.key) {
                settingsOverlay.style.display = 'flex';
                isSending = false;
                return;
            }

            isSending = true;
            sendBtn.disabled = true;

            // 移除欢迎消息
            const welcome = chatArea.querySelector('.welcome');
            if (welcome) welcome.remove();

            // 添加用户消息
            addMessage(message, 'user');
            chatHistory.push({ role: 'user', content: message });
            saveChat();

            messageInput.value = '';
            messageInput.style.height = 'auto';

            // 显示加载动画
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message cocoa';
            typingDiv.innerHTML = `
                <div class="message-avatar"><img src="avatar.jpg" style="width:100%;height:100%;border-radius:50%;object-fit:cover;"></div>
                <div class="message-content typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            `;
            chatArea.appendChild(typingDiv);
            scrollToBottom();

            try {
                const response = await callAPI();
                typingDiv.remove();
                addMessage(response, 'cocoa');
                chatHistory.push({ role: 'assistant', content: response });
                saveChat();
            } catch (error) {
                typingDiv.remove();
                const errorMsg = '呜呜呜…出了点问题呢🥹 ' + error.message;
                addMessage(errorMsg, 'cocoa');
            }

            isSending = false;
            sendBtn.disabled = false;
            messageInput.focus();
        }

        function addMessage(text, type, silent) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            if (silent) div.style.animation = 'none';
            div.innerHTML = `
                <div class="message-avatar">${type === 'cocoa' ? '<img src="avatar.jpg" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">' : '🧑'}</div>
                <div class="message-content">${escapeHtml(text)}</div>
            `;
            chatArea.appendChild(div);
            scrollToBottom();
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\n/g, '<br>');
        }

        function scrollToBottom() {
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // ===== API 调用 =====
        async function callAPI() {
            const messages = [
                { role: 'system', content: SYSTEM_PROMPT },
                ...chatHistory.slice(-40)
            ];

            let response;
            if (config.provider === 'deepseek') {
                response = await fetch(API_ENDPOINTS.deepseek, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + config.key
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: messages,
                        temperature: 0.85,
                        max_tokens: 500
                    })
                });
                if (!response.ok) {
                    const error = await response.json().catch(function() { return {}; });
                    throw new Error((error.error && error.error.message) || '请求失败 (' + response.status + ')');
                }
                const data = await response.json();
                return data.choices[0].message.content;
            } else {
                response = await fetch(API_ENDPOINTS.qwen, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + config.key
                    },
                    body: JSON.stringify({
                        model: 'qwen-turbo',
                        input: { messages: messages },
                        parameters: { temperature: 0.85 }
                    })
                });
                if (!response.ok) {
                    const error = await response.json().catch(function() { return {}; });
                    throw new Error(error.message || '请求失败 (' + response.status + ')');
                }
                const data = await response.json();
                return data.output.text;
            }
        }
    </script>
</body>
</html>
